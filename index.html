<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>리뉴얼 중입니다</title>
  <meta name="description" content="더 나은 서비스 제공을 위해 웹사이트를 리뉴얼 중입니다." />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root{
      --bg1:#0b1220; --bg2:#111b33; --card:rgba(255,255,255,.08);
      --text:#e9eefc; --muted:rgba(233,238,252,.72); --line:rgba(255,255,255,.14);
      --accent:#7aa7ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Apple SD Gothic Neo","Noto Sans KR", Segoe UI, Roboto, Arial;
      color:var(--text);
      background: radial-gradient(1200px 600px at 20% 10%, #1b2a6a 0%, transparent 55%),
                  radial-gradient(900px 500px at 80% 30%, #0f7a8a 0%, transparent 50%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      padding:24px;
    }
    .wrap{width:min(720px, 100%)}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .badge{
      display:inline-flex; gap:10px; align-items:center;
      padding:8px 12px; border-radius:999px;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:14px;
    }
    .dot{width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 6px rgba(122,167,255,.18)}
    h1{margin:16px 0 8px; font-size:34px; letter-spacing:-.02em}
    p{margin:0 0 14px; color:var(--muted); line-height:1.65}
    .grid{display:grid; grid-template-columns:1fr; gap:14px; margin-top:18px}
    .box{
      padding:14px 16px; border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.12);
    }
    .row{display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between}
    .key{color:var(--muted); font-size:13px}
    a{color:var(--text); text-decoration:none; border-bottom:1px dashed rgba(233,238,252,.35)}
    a:hover{border-bottom-color:rgba(233,238,252,.8)}
    .btn{
      display:inline-block; padding:10px 14px; border-radius:12px;
      border:1px solid rgba(122,167,255,.55);
      background:rgba(122,167,255,.12);
    }
    footer{margin-top:14px; color:rgba(233,238,252,.55); font-size:12px}
    @media (min-width:680px){
      .grid{grid-template-columns: 1.2fr .8fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge"><span class="dot"></span>웹사이트 리뉴얼 중</div>
      <h1>더 나은 경험을 준비하고 있어요.</h1>
      <p>현재 사이트를 개선하는 작업을 진행 중입니다.</p>

      <div class="grid">
        <div class="box">
          <div class="row">
            <div>
              <div class="key">예상 오픈</div>
              <div><strong>2026.03.31</strong> </div>
            </div>
            <a class="btn" href="mailto:contact@yourdomain.com">문의하기</a>
          </div>
        </div>

        <div class="box">
          <div class="key">빠른 안내</div>
          <div style="margin-top:6px; color:rgba(233,238,252,.78)">
            긴급 문의: <a href="tel:02-3447-7900">02-3447-7900</a><br/>
            이메일: <a href="mailto:ofcourse77@naver.com">ofcourse77@naver.com</a>
          </div>
        </div>
      </div>

      <footer>© 커뮤니케이션즈오브코스. All rights reserved.</footer>
    </div>
  </div>
</body>
</html>
